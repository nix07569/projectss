<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FinSight Performance</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '72', '72full', Arial, Helvetica, sans-serif; background: #f2f2f2; font-size: 14px; color: #32363a; }

/* ══════════════════════════════
   TOP BAR
══════════════════════════════ */
.topbar {
  background: #fff; border-bottom: 1px solid #d9d9d9;
  height: 48px; display: flex; align-items: center;
  padding: 0 16px; gap: 10px; position: sticky; top: 0; z-index: 200;
}
.menu-btn {
  background: none; border: none; cursor: pointer; padding: 6px;
  display: flex; align-items: center; border-radius: 4px; color: #32363a;
}
.menu-btn:hover { background: #f5f5f5; }
.menu-btn svg { width: 18px; height: 18px; }

.logo-block { display: flex; flex-direction: column; justify-content: center; line-height: 1; }
.logo-aspire { font-size: 9px; color: #74777a; font-style: italic; letter-spacing: 0.4px; margin-bottom: 1px; }
.logo-text { display: flex; align-items: baseline; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
.logo-fin  { color: #1870C5; }
.logo-sight{ color: #32363a; }
.logo-perf { color: #32363a; font-weight: 400; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }
.icon-btn { background: none; border: none; cursor: pointer; padding: 6px 8px; border-radius: 4px; color: #74777a; font-size: 15px; }
.icon-btn:hover { background: #f5f5f5; color: #32363a; }

/* ══════════════════════════════
   PAGE ROOT
══════════════════════════════ */
.page-root { background: #fff; min-height: calc(100vh - 48px); padding-bottom: 40px; }

/* ══════════════════════════════
   TITLE BAR
══════════════════════════════ */
.title-bar { padding: 18px 24px 6px 24px; display: flex; align-items: center; gap: 10px; }
.filter-icon { display: flex; }
.filter-icon svg { width: 22px; height: 22px; }
.page-title { font-size: 26px; font-weight: 700; color: #32363a; letter-spacing: -0.3px; }

/* ══════════════════════════════
   NAV PANEL
══════════════════════════════ */
.nav-panel { display: flex; justify-content: flex-end; padding: 0 24px; margin-top: -4px; }
.nav-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 0; }

.segment-row { display: flex; align-items: flex-end; border-bottom: 2px solid #e5e5e5; gap: 0; }
.seg-btn {
  background: none; border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; padding: 6px 18px; font-size: 14px; font-weight: 400;
  color: #74777a; cursor: pointer; transition: color .15s, border-color .15s;
  white-space: nowrap; font-family: inherit;
}
.seg-btn:hover { color: #32363a; }
.seg-btn.active { color: #1a3661; font-weight: 700; border-bottom: 3px solid #1a3661; }

.view-row { display: flex; align-items: flex-end; border-bottom: 2px solid #e5e5e5; gap: 0; margin-top: 4px; }
.view-btn {
  background: none; border: none; border-bottom: 3px solid transparent;
  margin-bottom: -2px; padding: 5px 14px; font-size: 13px; font-weight: 400;
  color: #74777a; cursor: pointer; transition: color .15s, border-color .15s;
  white-space: nowrap; font-family: inherit;
}
.view-btn:hover { color: #32363a; }
.view-btn.active { color: #1a3661; font-weight: 700; border-bottom: 3px solid #1a3661; }

.toggles-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
.rp-label { font-size: 13px; font-weight: 700; color: #32363a; }
.rp-value  { font-size: 13px; color: #32363a; }

.seg-toggle { display: flex; border: 1.5px solid #1870C5; border-radius: 4px; overflow: hidden; }
.tog-btn {
  background: #fff; border: none; color: #1870C5;
  font-size: 12px; font-weight: 600; padding: 4px 13px;
  cursor: pointer; min-width: 42px; height: 28px; font-family: inherit;
  transition: background .12s, color .12s; border-right: 1px solid #1870C5;
}
.tog-btn:last-child { border-right: none; }
.tog-btn:hover:not(.active) { background: #e8f3ff; }
.tog-btn.active { background: #1870C5; color: #fff; }

/* ══════════════════════════════
   RESET + DIVIDER
══════════════════════════════ */
.reset-row { padding: 8px 24px 2px; }
.reset-link { background: none; border: none; color: #1870C5; font-size: 13px; cursor: pointer; font-family: inherit; text-decoration: underline; }
.reset-link:hover { color: #1046a0; }
.divider { border: none; border-top: 1px solid #e5e5e5; margin: 6px 24px 16px; }

/* ══════════════════════════════
   BUSY / SKELETON SYSTEM
══════════════════════════════ */

/* Spinning ring */
@keyframes spin     { to { transform: rotate(360deg); } }
@keyframes shimmer  { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes cardIn   { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
@keyframes fadeIn   { from{opacity:0} to{opacity:1} }

/* Full-page overlay (behind nav, above content) */
#pageBusy {
  position: fixed; inset: 48px 0 0 0;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(1.5px);
  display: flex; align-items: center; justify-content: center;
  z-index: 180;
  opacity: 0; pointer-events: none;
  transition: opacity .18s;
}
#pageBusy.visible { opacity: 1; pointer-events: all; }

.busy-center { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.busy-ring {
  width: 40px; height: 40px;
  border: 3px solid #d6e6f8;
  border-top-color: #1870C5;
  border-radius: 50%;
  animation: spin .72s linear infinite;
}
.busy-ring.sm { width: 28px; height: 28px; border-width: 2.5px; }
.busy-label { font-size: 12px; color: #74777a; letter-spacing: .2px; }

/* Card-area overlay */
#cardBusy {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.65);
  display: flex; align-items: center; justify-content: center;
  z-index: 10;
  border-radius: 4px;
  opacity: 0; pointer-events: none;
  transition: opacity .15s;
}
#cardBusy.visible { opacity: 1; pointer-events: all; }

/* Skeleton card */
.card-skel {
  background: #fff;
  border: 1px solid #e8e8e8; border-radius: 4px;
  padding: 12px 14px 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
  overflow: hidden; position: relative;
}
.card-skel::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,.8) 50%, transparent 75%);
  background-size: 200% 100%;
  animation: shimmer 1.3s ease-in-out infinite;
}
.sk { background: #ebebeb; border-radius: 3px; }
.sk-t  { height: 11px; width: 52%; margin-bottom: 10px; }
.sk-v  { height: 20px; width: 38%; margin-bottom: 10px; }
.sk-r  { display: flex; gap: 8px; margin-bottom: 8px; }
.sk-r .sk { height: 9px; flex: 1; }
.sk-s  { height: 30px; width: 100%; border-radius: 3px; }

/* ══════════════════════════════
   CARD CONTAINER
══════════════════════════════ */
.card-container { padding: 0 16px 24px; position: relative; min-height: 260px; }

/* ══════════════════════════════
   OVERVIEW GRID — 6 cols × 2 rows
══════════════════════════════ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px;
}
/* Responsive */
@media (max-width:1360px){ .card-grid{ grid-template-columns:repeat(4,1fr); } }
@media (max-width:1020px){ .card-grid{ grid-template-columns:repeat(3,1fr); } }
@media (max-width: 700px){ .card-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width: 440px){ .card-grid{ grid-template-columns:1fr; } }

/* Trends: 3 cols */
.card-grid.trends-grid { grid-template-columns:repeat(3,1fr); }
@media (max-width:1020px){ .card-grid.trends-grid{ grid-template-columns:repeat(2,1fr); } }
@media (max-width: 640px){ .card-grid.trends-grid{ grid-template-columns:1fr; } }

/* ── KPI Card ── */
.kpi-card {
  background: #fff; border: 1px solid #e4e4e4; border-radius: 4px;
  padding: 12px 13px 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
  transition: box-shadow .15s, transform .15s;
  animation: cardIn .28s ease both;
  cursor: default;
}
.kpi-card:hover { box-shadow: 0 3px 10px rgba(24,112,197,.14); transform: translateY(-1px); }

.kpi-card:nth-child(1) {animation-delay:.02s}
.kpi-card:nth-child(2) {animation-delay:.05s}
.kpi-card:nth-child(3) {animation-delay:.08s}
.kpi-card:nth-child(4) {animation-delay:.11s}
.kpi-card:nth-child(5) {animation-delay:.14s}
.kpi-card:nth-child(6) {animation-delay:.17s}
.kpi-card:nth-child(7) {animation-delay:.20s}
.kpi-card:nth-child(8) {animation-delay:.23s}
.kpi-card:nth-child(9) {animation-delay:.26s}
.kpi-card:nth-child(10){animation-delay:.29s}
.kpi-card:nth-child(11){animation-delay:.32s}
.kpi-card:nth-child(12){animation-delay:.35s}

.card-title { font-size: 11.5px; font-weight: 700; color: #32363a; margin-bottom: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.kpi-actual { font-size: 16px; font-weight: 700; color: #1a3661; line-height: 1.2; margin-bottom: 5px; }
.kpi-sub-row { display: flex; gap: 10px; padding-top: 4px; border-top: 1px solid #f0f0f0; margin-bottom: 5px; }
.kpi-col label { display: block; font-size: 9px; color: #9a9a9a; margin-bottom: 1px; text-transform: uppercase; letter-spacing: .3px; }
.kpi-prior  { font-size: 11px; color: #74777a; }
.kpi-budget { font-size: 11px; color: #74777a; }
.kpi-meta   { font-size: 9px; color: #9a9a9a; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 2px; }
.variance-row { display: flex; align-items: center; gap: 3px; margin-bottom: 3px; }
.var-icon  { font-size: 11px; }
.var-text  { font-size: 11px; font-weight: 600; }
.var-label { font-size: 10px; color: #9a9a9a; }
.spark-row { margin-top: 3px; line-height: 0; }
.spark-row svg { display: block; width: 100%; }

/* ── Row-divider label between row 1 & 2 ── */
.row-divider {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0 2px;
}
.row-divider span {
  font-size: 10px; font-weight: 600; color: #b0b0b0;
  text-transform: uppercase; letter-spacing: .5px; white-space: nowrap;
}
.row-divider::before, .row-divider::after {
  content: ''; flex: 1; height: 1px; background: #ebebeb;
}

/* ── Trend Card ── */
.trend-card {
  background: #fff; border: 1px solid #e4e4e4; border-radius: 4px;
  padding: 12px 13px 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
  transition: box-shadow .15s, transform .15s;
  animation: cardIn .28s ease both;
}
.trend-card:hover { box-shadow: 0 3px 10px rgba(24,112,197,.14); transform: translateY(-1px); }
.trend-card:nth-child(1){animation-delay:.03s}
.trend-card:nth-child(2){animation-delay:.08s}
.trend-card:nth-child(3){animation-delay:.13s}
.trend-card:nth-child(4){animation-delay:.18s}
.trend-card:nth-child(5){animation-delay:.23s}
.trend-card:nth-child(6){animation-delay:.28s}

.trend-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.yoy-badge { display: flex; align-items: center; gap: 3px; font-size: 11px; font-weight: 600; }
.trend-chart-wrap { margin-bottom: 4px; }
.trend-chart-wrap svg { width: 100%; display: block; }
.trend-labels { display: flex; justify-content: space-between; }
.trend-labels span { font-size: 9px; color: #9a9a9a; }
</style>
</head>

/* ── FORMATTERS ── */
function fmtVal(v, unit, card) {
  if (card.isHead)    return Number(v).toLocaleString();
  if (card.isPercent) return v.toFixed(1) + "%";
  if (unit === "bn")  return "$" + Number(v).toFixed(3) + "bn";
  return "$" + Number(v).toLocaleString() + "m";
}

function buildSpark(data) {
  var w=200, h=32, pad=3;
  var min=Math.min.apply(null,data), max=Math.max.apply(null,data), rng=max-min||1;
  var step=(w-pad*2)/(data.length-1);
  var pts=data.map(function(v,i){
    return (pad+i*step).toFixed(1)+","+(h-pad-((v-min)/rng)*(h-pad*2)).toFixed(1);
  }).join(" ");
  var lx=(pad+(data.length-1)*step).toFixed(1);
  var ly=(h-pad-((data[data.length-1]-min)/rng)*(h-pad*2)).toFixed(1);
  return '<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">' +
    '<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#1870C5" stop-opacity=".13"/>' +
      '<stop offset="100%" stop-color="#1870C5" stop-opacity="0"/>' +
    '</linearGradient></defs>' +
    '<polygon fill="url(#sg)" points="'+pad+','+h+' '+pts+' '+lx+','+h+'"/>' +
    '<polyline fill="none" stroke="#1870C5" stroke-width="1.5" points="'+pts+'"/>' +
    '<circle cx="'+lx+'" cy="'+ly+'" r="3" fill="#1870C5" stroke="#fff" stroke-width="1.5"/>' +
    '</svg>';
}

function buildBar(data) {
  var w=300, h=75, barW=30, gap=12, pad=4;
  var max=Math.max.apply(null,data)*1.18||1;
  var svg='<svg width="100%" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">';
  data.forEach(function(v,i){
    var bh=Math.max(2,((v/max)*(h-pad*2)));
    var x=pad+i*(barW+gap);
    svg+='<rect x="'+x.toFixed(1)+'" y="'+(h-pad-bh).toFixed(1)+'" width="'+barW+'" height="'+bh.toFixed(1)+'" fill="'+(i===data.length-1?'#1870C5':'#B8D4F0')+'" rx="2"/>';
  });
  svg+='</svg>';
  return svg;
}

/* ── BUSY HELPERS ── */
var _busyTimer = null;
function showBusy(msg) {
  document.getElementById("busyLabel").textContent = msg||"Loading data…";
  document.getElementById("pageBusy").classList.add("visible");
  document.getElementById("cardBusy").classList.add("visible");
}
function hideBusy() {
  document.getElementById("pageBusy").classList.remove("visible");
  document.getElementById("cardBusy").classList.remove("visible");
}

/* ── SKELETON ── */
function renderSkeletons(n) {
  var g=document.getElementById("cardGrid");
  g.innerHTML=""; g.className="card-grid";
  for(var i=0;i<n;i++){
    g.innerHTML+='<div class="card-skel">'+
      '<div class="sk sk-t"></div>'+
      '<div class="sk sk-v"></div>'+
      '<div class="sk-r"><div class="sk"></div><div class="sk"></div></div>'+
      '<div class="sk sk-s"></div>'+
    '</div>';
  }
}

/* ── RENDER CARDS ── */
function renderCards(seg, view, unit, fx) {
  var data=MOCK[seg][view];
  var g=document.getElementById("cardGrid");
  var isOv=(view==="Overview");
  g.innerHTML="";
  g.className=isOv?"card-grid":"card-grid trends-grid";

  if (isOv) {
    data.forEach(function(card, idx){
      /* inject a visual row-divider after card index 5 (between row 1 and row 2) */
      if (idx===6) {
        g.innerHTML+='<div class="row-divider"><span>Row 2</span></div>';
      }
      var actual=(fx==="CFX")?card.cfx:(unit==="bn"?card.actual_bn:card.actual_m);
      var prior =unit==="bn"?card.prior_bn :card.prior_m;
      var bud   =unit==="bn"?card.budget_bn:card.budget_m;
      var vc    =card.dir==="up"?"#1d6f2f":"#bb0000";
      var ar    =card.dir==="up"?"▲":"▼";
      g.innerHTML+=
        '<div class="kpi-card">'+
          '<div class="card-title">'+card.title+'</div>'+
          '<div class="kpi-meta">Actual</div>'+
          '<div class="kpi-actual">'+fmtVal(actual,unit,card)+'</div>'+
          '<div class="kpi-sub-row">'+
            '<div class="kpi-col"><label>Prior Year</label><div class="kpi-prior">'+fmtVal(prior,unit,card)+'</div></div>'+
            '<div class="kpi-col"><label>Budget</label><div class="kpi-budget">'+fmtVal(bud,unit,card)+'</div></div>'+
          '</div>'+
          '<div class="variance-row">'+
            '<span class="var-icon" style="color:'+vc+'">'+ar+'</span>'+
            '<span class="var-text" style="color:'+vc+'">'+Math.abs(card.variance).toFixed(1)+'%</span>'+
            '<span class="var-label">&nbsp;vs PY</span>'+
          '</div>'+
          '<div class="spark-row">'+buildSpark(card.spark)+'</div>'+
        '</div>';
    });
  } else {
    data.forEach(function(card){
      var yc=card.yoy>=0?"#1d6f2f":"#bb0000";
      var ya=card.yoy>=0?"▲":"▼";
      var lh=card.labels.map(function(l){return '<span>'+l+'</span>';}).join('');
      g.innerHTML+=
        '<div class="trend-card">'+
          '<div class="trend-header">'+
            '<div class="card-title" style="margin-bottom:0">'+card.title+'</div>'+
            '<div class="yoy-badge" style="color:'+yc+'">'+ya+' '+Math.abs(card.yoy).toFixed(1)+'% YoY</div>'+
          '</div>'+
          '<div class="trend-chart-wrap">'+buildBar(card.data)+'</div>'+
          '<div class="trend-labels">'+lh+'</div>'+
        '</div>';
    });
  }
}

/* ── FULL RENDER (with optional busy) ── */
function render(withBusy, busyMsg) {
  var seg=state.segment, view=state.view;
  var t=state.toggles[seg];
  document.getElementById("pageTitle").textContent=seg+" | Financials | "+view;
  document.querySelectorAll(".seg-btn").forEach(function(b){b.classList.toggle("active",b.dataset.seg===seg);});
  document.querySelectorAll(".view-btn").forEach(function(b){b.classList.toggle("active",b.dataset.view===view);});
  document.querySelectorAll("#unitToggle .tog-btn").forEach(function(b){b.classList.toggle("active",b.dataset.unit===t.unit);});
  document.querySelectorAll("#fxToggle .tog-btn").forEach(function(b){b.classList.toggle("active",b.dataset.fx===t.fx);});

  if (withBusy) {
    renderSkeletons(view==="Overview"?12:6);
    showBusy(busyMsg||"Loading "+seg+" data…");
    if(_busyTimer)clearTimeout(_busyTimer);
    _busyTimer=setTimeout(function(){
      hideBusy();
      renderCards(seg,view,t.unit,t.fx);
    }, 700);
  } else {
    renderCards(seg,view,t.unit,t.fx);
  }
}

/* ── EVENTS ── */
document.getElementById("segmentRow").addEventListener("click",function(e){
  var b=e.target.closest(".seg-btn"); if(!b||b.dataset.seg===state.segment)return;
  state.segment=b.dataset.seg; render(true);
});
document.getElementById("viewRow").addEventListener("click",function(e){
  var b=e.target.closest(".view-btn"); if(!b||b.dataset.view===state.view)return;
  state.view=b.dataset.view; render(true,"Switching to "+b.dataset.view+"…");
});
document.getElementById("unitToggle").addEventListener("click",function(e){
  var b=e.target.closest(".tog-btn"); if(!b)return;
  state.toggles[state.segment].unit=b.dataset.unit; render(false);
});
document.getElementById("fxToggle").addEventListener("click",function(e){
  var b=e.target.closest(".tog-btn"); if(!b)return;
  state.toggles[state.segment].fx=b.dataset.fx; render(false);
});
document.getElementById("resetBtn").addEventListener("click",function(){
  state.toggles[state.segment]={unit:"m",fx:"RFX"}; render(false);
});

/* ── INIT (show skeleton + busy on first load) ── */
renderSkeletons(12);
showBusy("Initialising FinSight…");
setTimeout(function(){ hideBusy(); renderCards("Group","Overview","m","RFX"); }, 950);
